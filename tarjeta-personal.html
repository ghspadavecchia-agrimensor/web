<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Digital | Ing. Agrim. Guido Spadavecchia</title>
    <style>
        /* --- Paleta de Colores y Estilos Base --- */
        :root {
            --primary: #003366; /* Azul Marino Original */
            --accent: #e67e22;  /* Naranja de Contraste */
            --bg: #f0f2f5;      /* Fondo Gris Claro */
            --text-dark: #333;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Espaciado para móviles */
        }

        /* --- Contenedor de la Tarjeta --- */
        .card {
            background: white;
            width: 100%;
            max-width: 380px; /* Ancho máximo ideal para tarjetas digitales */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
            border-top: 10px solid var(--primary); /* Línea superior azul */
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); /* Efecto sutil al pasar el mouse */
        }

        /* --- Encabezado de la Tarjeta --- */
        .header {
            padding: 40px 25px 20px 25px;
            background: white;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent); /* Borde naranja para destacar */
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 { font-size: 1.6rem; color: var(--primary); margin: 10px 0 5px 0; }
        .title { color: var(--text-dark); font-weight: bold; font-size: 1.1rem; margin: 0; }
        .matricula { color: #777; font-size: 0.9rem; margin: 5px 0; font-style: italic; }

        /* --- Sección de Servicios/Trabajos --- */
        .services-section {
            padding: 20px 25px;
            background-color: #fafafa; /* Fondo ligeramente diferente */
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .services-section h2 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 15px;
        }

        .services-list {
            text-align: left; /* Lista alineada a la izquierda */
            list-style: none;
            padding: 0;
            margin: 0;
            color: #555;
            font-size: 0.95rem;
        }

        .services-list li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 10px;
        }

        /* Viñeta personalizada con color de acento */
        .services-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        /* --- Sección de Enlaces/Botones --- */
        .links {
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.98); /* Efecto de presión */
        }

        .btn-ws { 
            background-color: #25D366; /* Verde Oficial WhatsApp */
        }
        .btn-ws:hover { background-color: #1ebe57; }

        .btn-mail { 
            background-color: var(--primary); /* Azul Marino Principal */
        }
        .btn-mail:hover { background-color: #002244; }

        .btn-web { 
            background-color: #666; /* Gris Neutro */
        }
        .btn-web:hover { background-color: #444; }

    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <img src="tu-foto.jpg" alt="Guido Spadavecchia" class="profile-img">
            <h1>Guido Spadavecchia</h1>
            <p class="title">Ingeniero Agrimensor</p>
            <p class="matricula">Matrícula Nacional: 3676</p>
        </div>
        
        <div class="services-section">
            <h2>Trabajos y Servicios</h2>
            <ul class="services-list">
                <li>Certificaciones de Estado Parcelario</li>
                <li>Mensuras y Subdivisiones</li>
                <li>Topografía de Alta Precisión</li>
                <li>Asesoramiento Profesional Integral</li>
            </ul>
        </div>

        <div class="links">
            <a href="https://wa.me/541131499294?text=Hola%20Guido,%20vi%20tu%20tarjeta%20digital" target="_blank" class="btn btn-ws">
                <span>💬 WhatsApp</span>
            </a>
            <a href="mailto:ghspadavecchia@gmail.com" class="btn btn-mail">
                <span>✉️ Enviar Email</span>
            </a>
            <a href="/" class="btn btn-web">
                <span>🌐 Visitar Sitio Web</span>
            </a>
        </div>

</body>
</html>
